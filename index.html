<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Contact Form</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: flex-start; 
            min-height: 100vh;
            padding:25px 20px;
        }

        .form-container {
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 500px;
        }

        .form-container h2 {
            color: #075e54;
            margin-bottom: 20px;
            text-align: center;
            font-size: 24px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        .form-group input, 
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s;
        }

        .form-group input:focus, 
        .form-group textarea:focus {
            border-color: #25d366;
        }

        .form-group textarea {
            resize: vertical;
            height: 80px;
        }

        .submit-btn {
            width: 100%;
            background-color: #25d366;
            color: white;
            border: none;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .submit-btn:hover {
            background-color: #20ba5a;
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>WhatsApp Contact Form</h2>
    <form id="whatsappForm">
        <div class="form-group">
            <label for="name">Name:*</label>
            <input type="text" id="name" required placeholder="">
        </div>

        <div class="form-group">
            <label for="username">Social (Optional):</label>
            <input type="text" id="username" placeholder="">
        </div>

        <div class="form-group">
            <label for="age">Age (Optional):</label>
            <input type="number" id="age" placeholder="">
        </div>

        <div class="form-group">
            <label for="email">Email (Optional):</label>
            <input type="email" id="email" placeholder="">
        </div>

        <div class="form-group">
            <label for="address">Address:*</label>
            <input type="text" id="address" required placeholder="">
        </div>

        <div class="form-group">
            <label for="message">Message:*</label>
            <textarea id="message" required placeholder=""></textarea>
        </div>

        <button type="submit" class="submit-btn">Send to WhatsApp</button>
    </form>
</div>

<script>
    document.getElementById('whatsappForm').addEventListener('submit', function(event) {
        // Form ko refresh hone se rokna
        event.preventDefault();

        // **Apna WhatsApp Number yahan dalein** (Country code ke saath, bina '+' ya '-' ke)
        const phoneNumber = "916000012335"; 

        // Inputs se value nikalna aur extra spaces ko .trim() se saaf karna
        const name = document.getElementById('name').value.trim();
        const address = document.getElementById('address').value.trim();
        const message = document.getElementById('message').value.trim();

        // Optional Fields: Agar user khaali chode toh 'Not Provided' ya '-' set ho jaye
        const username = document.getElementById('username').value.trim() || "Not Provided";
        const age = document.getElementById('age').value.trim() || "Not Provided";
        const email = document.getElementById('email').value.trim() || "Not Provided";

        // WhatsApp Chat ke liye text layout
        let textMessage = `*New Form Submission*\n\n` +
                          `*Name:* ${name}\n` +
                          `*Username:* ${username}\n` +
                          `*Age:* ${age}\n` +
                          `*Email:* ${email}\n` +
                          `*Address:* ${address}\n` +
                          `*Message:* ${message}`;

        // encodeURIComponent() use karne se special characters, space aur emojis crash nahi hote
        const encodedMessage = encodeURIComponent(textMessage);

        // Final WhatsApp URL string
        const whatsappUrl = `https://api.whatsapp.com/send?phone=${phoneNumber}&text=${encodedMessage}`;

        // Naye Window/Tab mein open karne ke liye
        window.open(whatsappUrl, '_blank');
    });
</script>

</body>
</html>
